<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PORTAL ZERO 2D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PeerJS for Multiplayer -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background-color: #ffffff; 
        font-family: 'VT323', monospace;
        user-select: none;
      }
      /* Hide scrollbar */
      ::-webkit-scrollbar {
        display: none;
      }

      /* Minecraft UI Utilities */
      .mc-font {
        font-family: 'VT323', monospace;
      }

      .mc-panel {
        background-color: #c6c6c6;
        border: 4px solid #000;
        box-shadow: inset 4px 4px #fff, inset -4px -4px #555;
      }

      .mc-btn {
        background-color: #c6c6c6;
        border: 2px solid #000;
        /* Reduced shadow thickness for shorter buttons */
        box-shadow: inset 2px 2px #fff, inset -2px -2px #555;
        cursor: pointer;
        transition: filter 0.1s;
        text-transform: uppercase;
        color: #222;
        text-shadow: 1px 1px #fff;
        line-height: 1;
      }

      .mc-btn:hover {
        background-color: #d6d6d6;
        filter: brightness(1.1);
      }

      .mc-btn:active {
        background-color: #a0a0a0;
        box-shadow: inset 1px 1px #555, inset -1px -1px #fff;
        transform: translateY(2px);
      }

      .mc-btn:disabled {
        color: #777;
        background-color: #a0a0a0;
        cursor: not-allowed;
      }

      .pixel-shadow {
        text-shadow: 2px 2px 0px #000;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",

    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</body>
</html>
